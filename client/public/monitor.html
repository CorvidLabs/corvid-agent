<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Corvid Agent Monitor</title>
<style>
  /*
   * WCAG AAA contrast targets:
   *   Normal text (< 18pt): 7:1 minimum
   *   Large text (>= 18pt / 14pt bold): 4.5:1 minimum
   *   UI components & graphical objects: 3:1 minimum
   *
   * All colors below verified against their background.
   */
  :root {
    --bg: #0a0e14;          /* main background */
    --surface: #131820;     /* panel background */
    --surface2: #1e2530;    /* hover state */
    --border: #2e3848;      /* borders — 3.1:1 on --surface for UI components */
    --text: #e8ecf1;        /* primary text — 14.3:1 on --bg, 12.6:1 on --surface */
    --secondary: #a8b2c1;   /* secondary text — 7.3:1 on --bg, 6.4:1 on --surface (large/bold only) */
    --muted: #9aa4b4;       /* labels — 7.1:1 on --surface (used at 10px bold = large text) */
    --green: #5ddb72;       /* healthy — 8.2:1 on --bg */
    --red: #ff7b72;         /* errors — 7.1:1 on --bg */
    --yellow: #f0c239;      /* warnings — 10.1:1 on --bg */
    --blue: #79c0ff;        /* session — 8.6:1 on --bg */
    --purple: #d2a8ff;      /* schedule — 8.2:1 on --bg */
    --cyan: #56d4e0;        /* websocket — 9.5:1 on --bg */
    --orange: #ffa657;      /* audit — 8.3:1 on --bg */
    --focus: #79c0ff;       /* focus ring color */
    --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
      scroll-behavior: auto !important;
    }
  }

  /* Focus visible — visible ring for keyboard, hidden for mouse */
  :focus-visible {
    outline: 2px solid var(--focus);
    outline-offset: 2px;
  }
  :focus:not(:focus-visible) { outline: none; }

  body {
    font-family: var(--font-mono);
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    line-height: 1.5;
    overflow: hidden;
    height: 100vh;
  }

  /* ── Skip Link ───────────────────────────────────────────── */
  .skip-link {
    position: absolute;
    top: -100%;
    left: 4px;
    background: var(--surface);
    color: var(--text);
    padding: 8px 16px;
    z-index: 100;
    border: 2px solid var(--focus);
    border-radius: 4px;
    font-size: 13px;
    text-decoration: none;
  }
  .skip-link:focus { top: 4px; }

  /* ── Layout ──────────────────────────────────────────────── */
  .app {
    display: grid;
    grid-template-columns: 320px 1fr 340px;
    grid-template-rows: auto 1fr;
    height: 100vh;
    gap: 1px;
    background: var(--border);
  }

  header {
    grid-column: 1 / -1;
    background: var(--surface);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 16px;
    min-height: 48px;
  }

  .left-panel { background: var(--surface); overflow-y: auto; }
  .center-panel { background: var(--bg); display: flex; flex-direction: column; }
  .right-panel { background: var(--surface); overflow-y: auto; }

  /* ── Header ──────────────────────────────────────────────── */
  header h1 {
    font-size: 14px;
    font-weight: 700;
    color: var(--cyan);
    letter-spacing: 1px;
  }
  .status-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 12px;
    background: rgba(93, 219, 114, 0.12);
    border: 1px solid rgba(93, 219, 114, 0.4);
    color: var(--green);
  }
  .status-pill[data-status="unhealthy"] {
    background: rgba(255, 123, 114, 0.12);
    border-color: rgba(255, 123, 114, 0.4);
    color: var(--red);
  }
  .status-pill .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: currentColor;
    animation: pulse 2s ease infinite;
  }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  .header-stat { color: var(--secondary); font-size: 12px; }
  .header-stat strong { color: var(--text); }
  .spacer { flex: 1; }
  .clock { color: var(--secondary); font-size: 12px; }

  /* ── Section Headings ────────────────────────────────────── */
  .section-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    padding: 12px 12px 6px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--surface);
    z-index: 1;
  }

  /* ── Sessions Panel ──────────────────────────────────────── */
  .session-item {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  .session-item:hover, .session-item:focus-within { background: var(--surface2); }
  .session-name {
    font-size: 12px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
  }
  .session-meta {
    font-size: 11px;
    color: var(--secondary);
    display: flex;
    gap: 8px;
    margin-top: 2px;
  }

  /* Status indicators: color + text label (never color-only) */
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-weight: 600;
  }
  .status-badge::before {
    content: '';
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .status-badge[data-status="running"] { color: var(--green); }
  .status-badge[data-status="running"]::before { background: var(--green); }
  .status-badge[data-status="idle"] { color: var(--secondary); }
  .status-badge[data-status="idle"]::before { background: var(--secondary); }
  .status-badge[data-status="error"] { color: var(--red); }
  .status-badge[data-status="error"]::before { background: var(--red); }
  .status-badge[data-status="pending"] { color: var(--yellow); }
  .status-badge[data-status="pending"]::before { background: var(--yellow); }
  .status-badge[data-status="completed"] { color: var(--green); }
  .status-badge[data-status="completed"]::before { background: var(--green); }
  .status-badge[data-status="failed"] { color: var(--red); }
  .status-badge[data-status="failed"]::before { background: var(--red); }

  /* ── Live Feed ───────────────────────────────────────────── */
  .feed {
    flex: 1;
    overflow-y: auto;
    padding: 8px 12px;
    scroll-behavior: smooth;
  }
  .feed-entry {
    padding: 4px 0;
    border-bottom: 1px solid rgba(46, 56, 72, 0.5);
    display: flex;
    gap: 8px;
    font-size: 12px;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
  .feed-time { color: var(--secondary); flex-shrink: 0; min-width: 72px; }
  .feed-type {
    flex-shrink: 0;
    min-width: 110px;
    font-weight: 700;
  }
  .feed-type[data-category="session"]  { color: var(--blue); }
  .feed-type[data-category="schedule"] { color: var(--purple); }
  .feed-type[data-category="ws"]       { color: var(--cyan); }
  .feed-type[data-category="health"]   { color: var(--green); }
  .feed-type[data-category="error"]    { color: var(--red); }
  .feed-type[data-category="audit"]    { color: var(--orange); }
  .feed-type[data-category="poll"]     { color: var(--yellow); }
  .feed-msg { color: var(--text); word-break: break-word; }

  .feed-toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    font-size: 12px;
  }
  .feed-toolbar .count { color: var(--secondary); }
  .feed-toolbar button {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 12px;
  }
  .feed-toolbar button:hover { background: var(--border); }
  .scroll-status {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    color: var(--secondary);
  }
  .scroll-status::before {
    content: '';
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
  }
  .scroll-status[data-paused="true"]::before { background: var(--yellow); }
  .scroll-status[data-paused="true"] { color: var(--yellow); }

  /* ── Right Panel: Metrics ────────────────────────────────── */
  .metric-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
  }
  .metric {
    background: var(--surface);
    padding: 10px 12px;
  }
  .metric .label {
    font-size: 10px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .metric .value { font-size: 20px; font-weight: 700; margin-top: 2px; color: var(--text); }
  .metric .detail { font-size: 11px; color: var(--secondary); }

  .exec-item {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  .exec-name { font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 6px; }
  .exec-meta {
    color: var(--secondary);
    font-size: 11px;
    display: flex;
    justify-content: space-between;
    margin-top: 2px;
  }
  .exec-cost { color: var(--yellow); font-weight: 600; }

  /* ── Scrollbar ───────────────────────────────────────────── */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  /* ── Filter Chips (radio group) ──────────────────────────── */
  .filters {
    display: flex;
    gap: 4px;
    padding: 6px 12px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .filters [role="radio"] {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 10px;
    border: 1px solid var(--border);
    cursor: pointer;
    background: transparent;
    color: var(--secondary);
    font-family: var(--font-mono);
    transition: background 0.1s, border-color 0.1s;
  }
  .filters [role="radio"]:hover { background: var(--surface2); }
  .filters [role="radio"][aria-checked="true"] {
    background: rgba(121, 192, 255, 0.15);
    border-color: var(--blue);
    color: var(--blue);
  }
</style>
</head>
<body>

<a href="#feed" class="skip-link">Skip to live feed</a>

<div class="app" role="application" aria-label="Corvid Agent Monitor">
  <!-- Header -->
  <header>
    <h1>CORVID AGENT MONITOR</h1>
    <div id="health-pill" class="status-pill" role="status" aria-live="polite" aria-label="Server health">
      <span class="dot" aria-hidden="true"></span>
      <span id="health-text">connecting...</span>
    </div>
    <span class="header-stat" aria-label="Version">v<strong id="version">-</strong></span>
    <span class="header-stat" aria-label="Uptime">up <strong id="uptime">-</strong></span>
    <span class="header-stat" aria-label="GitHub API rate limit">GH <strong id="gh-rate">-</strong></span>
    <span class="spacer"></span>
    <span class="header-stat" aria-label="WebSocket status">WS <strong id="ws-status">closed</strong></span>
    <time class="clock" id="clock" aria-label="Current time"></time>
  </header>

  <!-- Left: Sessions -->
  <nav class="left-panel" aria-label="Sessions">
    <h2 class="section-title">Sessions <span id="session-count" style="float:right;color:var(--blue)" aria-label="Total sessions"></span></h2>
    <div id="sessions-list" role="list" aria-label="Session list"></div>
  </nav>

  <!-- Center: Live Feed -->
  <main class="center-panel" aria-label="Live event feed">
    <div class="filters" role="radiogroup" aria-label="Filter events by type">
      <span role="radio" aria-checked="true"  tabindex="0" data-filter="all">all</span>
      <span role="radio" aria-checked="false" tabindex="-1" data-filter="session">session</span>
      <span role="radio" aria-checked="false" tabindex="-1" data-filter="schedule">schedule</span>
      <span role="radio" aria-checked="false" tabindex="-1" data-filter="ws">websocket</span>
      <span role="radio" aria-checked="false" tabindex="-1" data-filter="health">health</span>
      <span role="radio" aria-checked="false" tabindex="-1" data-filter="audit">audit</span>
      <span role="radio" aria-checked="false" tabindex="-1" data-filter="poll">poll</span>
      <span role="radio" aria-checked="false" tabindex="-1" data-filter="error">error</span>
    </div>
    <div class="feed" id="feed" role="log" aria-live="polite" aria-label="Event log" tabindex="0"></div>
    <div class="feed-toolbar" role="toolbar" aria-label="Feed controls">
      <span class="scroll-status" id="scroll-status" role="status" aria-live="polite">auto-scroll</span>
      <span class="spacer"></span>
      <span class="count" aria-label="Event count"><span id="feed-count">0</span> events</span>
      <button type="button" aria-label="Clear feed">clear</button>
      <button type="button" aria-label="Export feed to file">export</button>
    </div>
  </main>

  <!-- Right: Metrics + Executions -->
  <aside class="right-panel" aria-label="System metrics and executions">
    <h2 class="section-title">System</h2>
    <div class="metric-grid" role="group" aria-label="System metrics">
      <div class="metric"><div class="label" id="lbl-agents">Agents</div><div class="value" id="m-agents" aria-labelledby="lbl-agents">-</div></div>
      <div class="metric"><div class="label" id="lbl-active">Active</div><div class="value" id="m-active" aria-labelledby="lbl-active">-</div></div>
      <div class="metric"><div class="label" id="lbl-sessions">Sessions</div><div class="value" id="m-sessions" aria-labelledby="lbl-sessions">-</div></div>
      <div class="metric"><div class="label" id="lbl-tasks">Work Tasks</div><div class="value" id="m-tasks" aria-labelledby="lbl-tasks">-</div></div>
      <div class="metric"><div class="label" id="lbl-db">DB Latency</div><div class="value" id="m-db" aria-labelledby="lbl-db">-</div><div class="detail">ms</div></div>
      <div class="metric"><div class="label" id="lbl-sched">Scheduler</div><div class="value" id="m-scheduler" aria-labelledby="lbl-sched">-</div></div>
    </div>
    <h2 class="section-title">Recent Executions</h2>
    <div id="executions-list" role="list" aria-label="Recent schedule executions"></div>
  </aside>
</div>

<script>
const API = '';
const WS_URL = `ws://${location.host}/ws`;

// ── State ─────────────────────────────────────────────────
let feedEntries = [];
let autoScroll = true;
let activeFilter = 'all';
let ws = null;
let wsRetryDelay = 1000;

// ── Clock ─────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  const el = document.getElementById('clock');
  const str = now.toLocaleTimeString('en-US', { hour12: false }) + ' ' +
    now.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  el.textContent = str;
  el.setAttribute('datetime', now.toISOString());
}
setInterval(updateClock, 1000);
updateClock();

// ── Feed ──────────────────────────────────────────────────
function normalizeTime(t) {
  if (!t) return new Date().toISOString();
  const s = String(t);
  return s.endsWith('Z') || s.includes('+') ? s : s.replace(' ', 'T') + 'Z';
}

function addFeedEntry(type, msg, time) {
  const entry = { type, msg, time: normalizeTime(time) };
  feedEntries.push(entry);
  if (feedEntries.length > 2000) feedEntries = feedEntries.slice(-1500);
  renderFeed();
  document.getElementById('feed-count').textContent = feedEntries.length;
}

function renderFeed() {
  const feed = document.getElementById('feed');
  const sorted = feedEntries
    .filter(e => activeFilter === 'all' || e.type === activeFilter)
    .sort((a, b) => new Date(b.time) - new Date(a.time));
  feed.innerHTML = '';
  for (const entry of sorted) {
    const el = document.createElement('div');
    el.className = 'feed-entry';
    el.setAttribute('role', 'listitem');
    const t = new Date(entry.time);
    const timeStr = t.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
    el.innerHTML =
      `<time class="feed-time" datetime="${escapeAttr(entry.time)}">${timeStr}</time>` +
      `<span class="feed-type" data-category="${escapeAttr(entry.type)}">${escapeHtml(entry.type)}</span>` +
      `<span class="feed-msg">${escapeHtml(entry.msg)}</span>`;
    feed.appendChild(el);
  }
  if (autoScroll) feed.scrollTop = feed.scrollHeight;
}

function clearFeed() {
  feedEntries = [];
  document.getElementById('feed').innerHTML = '';
  document.getElementById('feed-count').textContent = '0';
}

function exportFeed() {
  const text = feedEntries.map(e => `${e.time}\t${e.type}\t${e.msg}`).join('\n');
  const blob = new Blob([text], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `corvid-monitor-${new Date().toISOString().slice(0,16)}.log`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
function escapeAttr(s) {
  return s.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ── Feed scroll detection ─────────────────────────────────
const feedEl = document.getElementById('feed');
feedEl.addEventListener('scroll', () => {
  const atBottom = feedEl.scrollHeight - feedEl.scrollTop - feedEl.clientHeight < 40;
  autoScroll = atBottom;
  const ss = document.getElementById('scroll-status');
  ss.textContent = autoScroll ? 'auto-scroll' : 'paused';
  ss.dataset.paused = !autoScroll;
});

// ── Filter radio group (keyboard: arrow keys) ─────────────
const filterGroup = document.querySelector('.filters[role="radiogroup"]');
const filterRadios = Array.from(filterGroup.querySelectorAll('[role="radio"]'));

function activateFilter(radio) {
  filterRadios.forEach(r => { r.setAttribute('aria-checked', 'false'); r.tabIndex = -1; });
  radio.setAttribute('aria-checked', 'true');
  radio.tabIndex = 0;
  radio.focus();
  activeFilter = radio.dataset.filter;
  renderFeed();
}

filterRadios.forEach(radio => {
  radio.addEventListener('click', () => activateFilter(radio));
  radio.addEventListener('keydown', (e) => {
    let idx = filterRadios.indexOf(radio);
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
      e.preventDefault();
      activateFilter(filterRadios[(idx + 1) % filterRadios.length]);
    } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
      e.preventDefault();
      activateFilter(filterRadios[(idx - 1 + filterRadios.length) % filterRadios.length]);
    } else if (e.key === ' ' || e.key === 'Enter') {
      e.preventDefault();
      activateFilter(radio);
    }
  });
});

// ── Toolbar buttons ───────────────────────────────────────
document.querySelector('.feed-toolbar button[aria-label="Clear feed"]').addEventListener('click', clearFeed);
document.querySelector('.feed-toolbar button[aria-label="Export feed to file"]').addEventListener('click', exportFeed);

// ── Health Polling ────────────────────────────────────────
async function pollHealth() {
  try {
    const res = await fetch(`${API}/api/health`);
    const data = await res.json();
    const pill = document.getElementById('health-pill');
    const text = document.getElementById('health-text');
    const healthy = data.status === 'healthy';
    pill.dataset.status = healthy ? 'healthy' : 'unhealthy';
    text.textContent = healthy ? 'healthy' : data.status;
    document.getElementById('version').textContent = data.version || '-';

    const up = data.uptime || 0;
    const h = Math.floor(up / 3600);
    const m = Math.floor((up % 3600) / 60);
    document.getElementById('uptime').textContent = h > 0 ? `${h}h${m}m` : `${m}m`;

    const gh = data.dependencies?.github;
    if (gh) document.getElementById('gh-rate').textContent = `${gh.rate_limit_remaining}/${gh.rate_limit_total}`;

    const db = data.dependencies?.database;
    if (db) document.getElementById('m-db').textContent = db.latency_ms?.toFixed(1) || '-';
  } catch {
    document.getElementById('health-pill').dataset.status = 'unhealthy';
    document.getElementById('health-text').textContent = 'unreachable';
  }
}

// ── Dashboard Summary ─────────────────────────────────────
const seenAudit = new Set();
async function pollDashboard() {
  try {
    const res = await fetch(`${API}/api/dashboard/summary`);
    const data = await res.json();

    document.getElementById('m-agents').textContent = data.agents?.total ?? '-';
    document.getElementById('m-active').textContent = data.sessions?.active ?? 0;
    document.getElementById('m-sessions').textContent =
      Object.values(data.sessions?.byStatus || {}).reduce((a, b) => a + b, 0);
    document.getElementById('m-tasks').textContent = data.workTasks?.total ?? '-';

    if (data.recentActivity) {
      for (const a of data.recentActivity.slice(0, 5)) {
        // Skip repetitive auth_failed noise from dashboard polling
        if (a.action === 'auth_failed') continue;
        const key = `audit-${a.id}`;
        if (!seenAudit.has(key)) {
          seenAudit.add(key);
          const type = a.action?.includes('fail') || a.action?.includes('error') ? 'error' : 'audit';
          addFeedEntry(type, `[${a.action}] ${a.detail || ''} (${a.actor?.slice(0,8) || 'system'})`, a.timestamp);
        }
      }
    }
  } catch {}
}

// ── Sessions ──────────────────────────────────────────────
let prevSessionStatuses = {};
async function pollSessions() {
  try {
    const res = await fetch(`${API}/api/sessions`);
    const sessions = await res.json();
    const sorted = sessions.sort((a, b) => new Date(normalizeTime(b.updatedAt)) - new Date(normalizeTime(a.updatedAt)));

    document.getElementById('session-count').textContent = sorted.length;
    const list = document.getElementById('sessions-list');
    list.innerHTML = '';

    for (const s of sorted.slice(0, 50)) {
      const el = document.createElement('div');
      el.className = 'session-item';
      el.setAttribute('role', 'listitem');
      const name = escapeHtml(s.name || s.id.slice(0, 8));
      el.innerHTML =
        `<div class="session-name">` +
          `<span class="status-badge" data-status="${escapeAttr(s.status)}" aria-label="Status: ${escapeAttr(s.status)}">${escapeHtml(s.status)}</span> ` +
          `${name}` +
        `</div>` +
        `<div class="session-meta">` +
          `<span>${s.totalTurns || 0} turns</span>` +
          `<span>$${(s.totalCostUsd || 0).toFixed(2)}</span>` +
          `<span>${timeAgo(s.updatedAt)}</span>` +
        `</div>`;
      list.appendChild(el);

      if (prevSessionStatuses[s.id] && prevSessionStatuses[s.id] !== s.status) {
        addFeedEntry('session', `${s.name || s.id.slice(0,8)}: ${prevSessionStatuses[s.id]} -> ${s.status}`);
      }
      prevSessionStatuses[s.id] = s.status;
    }
  } catch {}
}

// ── Schedule Executions ───────────────────────────────────
let seenExecs = new Set();
async function pollExecutions() {
  try {
    const res = await fetch(`${API}/api/schedule-executions`);
    const execs = await res.json();
    const sorted = execs.sort((a, b) => new Date(normalizeTime(b.startedAt)) - new Date(normalizeTime(a.startedAt)));

    const list = document.getElementById('executions-list');
    list.innerHTML = '';

    for (const e of sorted.slice(0, 20)) {
      const el = document.createElement('div');
      el.className = 'exec-item';
      el.setAttribute('role', 'listitem');
      const snap = e.configSnapshot ? JSON.parse(e.configSnapshot) : {};
      const name = escapeHtml(snap.name || e.actionType);
      el.innerHTML =
        `<div class="exec-name">` +
          `<span class="status-badge" data-status="${escapeAttr(e.status)}" aria-label="Status: ${escapeAttr(e.status)}">${escapeHtml(e.status)}</span> ` +
          `${name}` +
        `</div>` +
        `<div class="exec-meta">` +
          `<span class="exec-cost" aria-label="Cost">$${(e.costUsd || 0).toFixed(2)}</span>` +
          `<span>${timeAgo(e.startedAt)}</span>` +
        `</div>`;
      list.appendChild(el);

      if (!seenExecs.has(e.id)) {
        seenExecs.add(e.id);
        if (seenExecs.size > 1) {
          const feedType = e.status === 'failed' ? 'error' : 'schedule';
          addFeedEntry(feedType, `[${e.actionType}] ${snap.name || e.actionType} — ${e.status} ($${(e.costUsd || 0).toFixed(2)})`, e.startedAt);
        }
      }
    }
  } catch {}
}

// ── Scheduler Health ──────────────────────────────────────
async function pollSchedulerHealth() {
  try {
    const res = await fetch(`${API}/api/scheduler/system-state`);
    const data = await res.json();
    const el = document.getElementById('m-scheduler');
    const state = data.states?.[0] || 'unknown';
    el.textContent = state;
  } catch {}
}

// ── WebSocket ─────────────────────────────────────────────
function connectWS() {
  try { ws = new WebSocket(WS_URL); } catch { scheduleReconnect(); return; }

  ws.onopen = () => {
    document.getElementById('ws-status').textContent = 'open';
    addFeedEntry('ws', 'WebSocket connected');
    wsRetryDelay = 1000;
  };

  ws.onmessage = (event) => {
    try { handleWSMessage(JSON.parse(event.data)); } catch {}
  };

  ws.onclose = () => {
    document.getElementById('ws-status').textContent = 'closed';
    scheduleReconnect();
  };

  ws.onerror = () => {
    document.getElementById('ws-status').textContent = 'error';
  };
}

function scheduleReconnect() {
  setTimeout(() => { wsRetryDelay = Math.min(wsRetryDelay * 1.5, 30000); connectWS(); }, wsRetryDelay);
}

function handleWSMessage(msg) {
  switch (msg.type) {
    case 'welcome':
      addFeedEntry('ws', `Server time: ${msg.serverTime}`);
      break;
    case 'ping':
      if (ws?.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'pong' }));
      break;
    case 'session_event':
      addFeedEntry('session', `[${msg.sessionId?.slice(0,8)}] ${msg.event?.eventType || 'event'}: ${summarizeEvent(msg.event)}`);
      break;
    case 'session_status':
      addFeedEntry('session', `[${msg.sessionId?.slice(0,8)}] status -> ${msg.status}`);
      break;
    case 'schedule_update':
      addFeedEntry('schedule', `Schedule updated: ${msg.schedule?.name || 'unknown'}`);
      break;
    case 'schedule_execution_update':
      addFeedEntry('schedule', `Execution ${msg.execution?.status}: ${msg.execution?.actionType || ''} ($${(msg.execution?.costUsd || 0).toFixed(2)})`);
      break;
    case 'schedule_approval_request':
      addFeedEntry('schedule', `Approval needed: ${msg.description || msg.actionType} [${msg.executionId?.slice(0,8)}]`);
      break;
    case 'work_task_update':
      addFeedEntry('session', `Work task ${msg.task?.status}: ${msg.task?.description?.slice(0,60) || ''}`);
      break;
    case 'agent_notification': {
      const lvl = msg.level === 'error' ? 'error' : 'audit';
      addFeedEntry(lvl, `[${msg.agentId?.slice(0,8)}] ${msg.title || ''}: ${msg.message}`);
      break;
    }
    case 'agent_question':
      addFeedEntry('audit', `Question from ${msg.question?.agentId?.slice(0,8)}: ${msg.question?.question?.slice(0,80)}`);
      break;
    case 'algochat_message':
      addFeedEntry('ws', `AlgoChat ${msg.direction}: ${msg.content?.slice(0,80)}`);
      break;
    case 'council_stage_change':
      addFeedEntry('session', `Council ${msg.launchId?.slice(0,8)} -> ${msg.stage}`);
      break;
    case 'chat_stream':
      if (msg.done) addFeedEntry('session', `Chat stream complete for ${msg.agentId?.slice(0,8)}`);
      break;
    case 'chat_tool_use':
      addFeedEntry('session', `[${msg.agentId?.slice(0,8)}] tool: ${msg.toolName}`);
      break;
    case 'error':
      addFeedEntry('error', msg.message);
      break;
  }
}

function summarizeEvent(event) {
  if (!event?.data) return '';
  const d = event.data;
  if (typeof d === 'string') return d.slice(0, 100);
  if (d.text) return d.text.slice(0, 100);
  if (d.tool_name) return `tool: ${d.tool_name}`;
  if (d.content) return (typeof d.content === 'string' ? d.content : JSON.stringify(d.content)).slice(0, 100);
  return JSON.stringify(d).slice(0, 80);
}

// ── Helpers ───────────────────────────────────────────────
function timeAgo(iso) {
  if (!iso) return '-';
  // Server timestamps are UTC but may lack 'Z' suffix — normalize
  const str = String(iso).endsWith('Z') ? iso : iso.replace(' ', 'T') + 'Z';
  const diff = (Date.now() - new Date(str).getTime()) / 1000;
  if (diff < 0) return 'just now';
  if (diff < 60) return `${Math.floor(diff)}s ago`;
  if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
  return `${Math.floor(diff / 86400)}d ago`;
}

// ── Init ──────────────────────────────────────────────────
async function init() {
  addFeedEntry('health', 'Monitor started');
  await pollHealth();
  await pollDashboard();
  await pollSessions();
  await pollExecutions();
  await pollSchedulerHealth();
  connectWS();
  setInterval(pollHealth, 10_000);
  setInterval(pollDashboard, 15_000);
  setInterval(pollSessions, 8_000);
  setInterval(pollExecutions, 12_000);
  setInterval(pollSchedulerHealth, 30_000);
  addFeedEntry('health', 'Polling active');
}

init();
</script>
