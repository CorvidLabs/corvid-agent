coverage:
  status:
    project:
      default:
        target: 80%
        threshold: 2%
    patch:
      default:
        target: 80%
        threshold: 15%

ignore:
  - "server/discord/gateway.ts"       # Integration-heavy Discord gateway — requires live connection
  - "server/discord/voice/**"          # Voice connection/audio — requires live Discord voice

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false

flags:
  server:
    paths:
      - server/
      - cli/
      - shared/
    carryforward: true
  client:
    paths:
      - client/src/
    carryforward: true
