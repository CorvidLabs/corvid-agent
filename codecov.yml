coverage:
  status:
    project:
      default:
        target: 80%
        threshold: 2%
    patch:
      default:
        target: 80%
        threshold: 15%

ignore:
  - "server/discord/gateway.ts"       # Integration-heavy Discord gateway — requires live connection
  - "server/discord/voice/**"          # Voice connection/audio — requires live Discord voice
  - "server/discord/bridge.ts"        # Discord bridge — requires live Discord client
  - "server/discord/commands.ts"      # Slash command registration — requires Discord API
  - "server/discord/command-handlers/**"  # Command handlers — require Discord interactions
  - "server/discord/thread-response/**"  # Thread response handlers — require live Discord threads

comment: false

flags:
  server:
    paths:
      - server/
      - cli/
      - shared/
    carryforward: true
  client:
    paths:
      - client/src/
    carryforward: true
