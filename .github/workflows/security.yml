name: Security Scanning

on:
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Monday at 7am UTC (after CodeQL)
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: Secret Scanning (gitleaks)
    runs-on: ubuntu-latest
    steps:
      # All actions pinned by SHA for supply-chain safety — Dependabot (P5) handles SHA bumps.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      # Use gitleaks CLI directly (the gitleaks-action requires a paid license for org repos)
      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION="8.24.0"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Run gitleaks
        run: gitleaks detect --source=. --config=.gitleaks.toml --verbose

  code-scan:
    name: Malicious Code & Fetch Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2.2.0
        with:
          bun-version: "1.3.8"

      # Skip --frozen-lockfile for Dependabot PRs: the lockfile-sync workflow
      # pushes an updated lockfile but GITHUB_TOKEN pushes don't re-trigger CI.
      - name: Install dependencies
        run: |
          if [ "${{ github.event.pull_request.user.login }}" = "dependabot[bot]" ]; then
            bun install --ignore-scripts
          else
            bun install --frozen-lockfile --ignore-scripts
          fi

      - name: Run security scanners
        run: bun scripts/ci-security-scan.ts

  dep-audit:
    name: Dependency Vulnerability Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2.2.0
        with:
          bun-version: "1.3.8"

      - name: Install dependencies
        run: |
          if [ "${{ github.event.pull_request.user.login }}" = "dependabot[bot]" ]; then
            bun install --ignore-scripts
          else
            bun install --frozen-lockfile --ignore-scripts
          fi

      - name: Audit dependencies
        run: bun x npm-audit-ci --moderate
