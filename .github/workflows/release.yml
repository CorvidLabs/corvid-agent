name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.2.0)"
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  # ── Run the full CI suite before releasing ──────────────────────
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  # ── Build & push Docker image ───────────────────────────────────
  docker:
    name: Docker
    needs: ci
    uses: ./.github/workflows/docker-publish.yml
    permissions:
      contents: read
      packages: write
      id-token: write

  # ── Create GitHub Release ───────────────────────────────────────
  release:
    name: GitHub Release
    needs: [ci, docker]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Determine tag
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "version=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if pre-release
        id: prerelease
        env:
          TAG: ${{ steps.tag.outputs.version }}
        run: |
          if echo "$TAG" | grep -qE '-(alpha|beta|rc)'; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate changelog
        id: changelog
        env:
          TAG: ${{ steps.tag.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          # Find the previous tag
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v' | grep -v "^${TAG}$" | head -n1)
          if [ -z "$PREV_TAG" ]; then
            # No previous tag — use all commits
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi
          {
            echo "changelog<<CHANGELOG_EOF"
            echo "## What's Changed"
            echo ""
            git log "$RANGE" --pretty=format:"* %s (%h)" --no-merges
            echo ""
            echo ""
            echo "**Full Changelog**: https://github.com/${REPO}/compare/${PREV_TAG:-$(git rev-list --max-parents=0 HEAD | head -1)}...$TAG"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build release tarball
        env:
          TAG: ${{ steps.tag.outputs.version }}
        run: |
          STAGING="$(mktemp -d)/corvid-agent"
          mkdir -p "$STAGING"

          # Copy runtime files only
          cp -r server/    "$STAGING/server"
          cp -r shared/    "$STAGING/shared"
          cp -r client/    "$STAGING/client"
          [ -d patches ] && cp -r patches/ "$STAGING/patches"
          cp package.json  "$STAGING/package.json"
          cp bun.lock      "$STAGING/bun.lock"
          cp .env.example  "$STAGING/.env.example"
          cp README.md     "$STAGING/README.md"
          cp LICENSE        "$STAGING/LICENSE"
          mkdir -p "$STAGING/scripts"
          cp scripts/install.sh "$STAGING/scripts/install.sh"
          cp scripts/setup.sh   "$STAGING/scripts/setup.sh"

          # Create tarball from staging parent dir
          tar -czf "corvid-agent-${TAG}.tar.gz" -C "$(dirname "$STAGING")" corvid-agent

          echo "Tarball contents:"
          tar -tzf "corvid-agent-${TAG}.tar.gz" | head -30
          ls -lh "corvid-agent-${TAG}.tar.gz"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v2
        with:
          tag_name: ${{ steps.tag.outputs.version }}
          name: ${{ steps.tag.outputs.version }}
          body: ${{ steps.changelog.outputs.changelog }}
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          generate_release_notes: false
          files: corvid-agent-${{ steps.tag.outputs.version }}.tar.gz

      - name: Corvin celebrates
        uses: CorvidLabs/corvid-pet@09e5112de5d6e2d6a6d04d33dde02b3b4ed4f62b  # v1.1.1
        with:
          mode: release
          event: auto
          pet-name: Corvin
