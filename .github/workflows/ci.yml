name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "LICENSE"
      - ".github/ISSUE_TEMPLATE/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "LICENSE"
      - ".github/ISSUE_TEMPLATE/**"
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build & Test (ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/setup-workspace

      - name: TypeScript check
        run: bun x tsc --noEmit --skipLibCheck

      - name: Run database migrations
        run: bun run migrate:up

      - name: Unit tests
        run: bun test

      - name: Spec check
        run: bash scripts/specsync.sh check --strict --require-coverage 100

  # macOS (10x multiplier) and Windows (2x) only run on release tags to save CI minutes
  build-cross-platform:
    name: Build & Test (${{ matrix.os }})
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/setup-workspace

      - name: TypeScript check
        run: bun x tsc --noEmit --skipLibCheck

      - name: Run database migrations
        run: bun run migrate:up

      - name: Unit tests
        # Windows process spawning and dynamic imports are ~3-5x slower;
        # use 30s per-test timeout there to avoid flaky failures (default 10s via bunfig).
        run: bun test ${{ matrix.os == 'windows-latest' && '--timeout 30000' || '' }}

  corvin:
    name: Corvin
    runs-on: ubuntu-latest
    needs: [build]
    if: always() && github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: CorvidLabs/corvid-pet@v1
        with:
          mode: pr-comment
          event: auto
          pet-name: Corvin
          review-on-pr: "true"
          job-status: ${{ needs.build.result }}
          context: "TypeScript check, unit tests, spec check — ${{ needs.build.result == 'success' && 'all passed on ubuntu' || 'failed — check build logs' }}. Cross-platform tests (macOS, Windows) run on release tags only."
