name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "LICENSE"
      - ".github/ISSUE_TEMPLATE/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "LICENSE"
      - ".github/ISSUE_TEMPLATE/**"
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build & Test
    runs-on: self-hosted
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/setup-workspace

      - name: TypeScript check
        run: bun x tsc --noEmit --skipLibCheck

      - name: Run database migrations
        run: bun run migrate:up

      - name: Unit tests
        run: bun test

  review:
    name: PR Review
    runs-on: self-hosted
    needs: [build]
    if: always() && github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Approve or request changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BUILD_RESULT: ${{ needs.build.result }}
        run: |
          if [ "$BUILD_RESULT" = "success" ]; then
            gh pr review "$PR_NUMBER" \
              --approve \
              --body "All CI checks passed (tsc, tests) on ubuntu. Cross-platform tests (macOS, Windows) run on release tags only."
          else
            gh pr review "$PR_NUMBER" \
              --request-changes \
              --body "CI checks failed. Please review the build logs and fix the issues before merging."
          fi
