name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/setup-workspace

      - name: TypeScript check
        run: bun x tsc --noEmit --skipLibCheck

      - name: Run database migrations
        run: bun run migrate:up

      - name: Unit tests
        # Windows process spawning and dynamic imports are ~3-5x slower;
        # use 30s per-test timeout there to avoid flaky failures (default 10s via bunfig).
        run: bun test ${{ matrix.os == 'windows-latest' && '--timeout 30000' || '' }}

      - name: Spec check (strict — warnings fail the build)
        run: bun run spec:check -- --strict

      - name: Version alignment check
        run: bun run version:check

      - name: Stats check
        if: matrix.os == 'ubuntu-latest'
        run: bun run stats:check -- --skip-tests

      - name: Build client
        run: bun run build:client

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/setup-workspace

      - name: Server tests with coverage
        run: bun test --coverage --coverage-reporter=lcov --coverage-dir=coverage/server

      - name: Client tests with coverage
        run: cd client && npx vitest run --coverage
        continue-on-error: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de  # v5
        with:
          files: coverage/server/lcov.info,coverage/client/lcov.info
          flags: server,client
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  review:
    name: PR Review
    runs-on: ubuntu-latest
    needs: build
    if: always() && github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Approve or request changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BUILD_RESULT: ${{ needs.build.result }}
        run: |
          if [ "$BUILD_RESULT" = "success" ]; then
            gh pr review "$PR_NUMBER" \
              --approve \
              --body "All CI checks passed (tsc, tests, spec:check, client build) across ubuntu, macos, and windows."
          else
            gh pr review "$PR_NUMBER" \
              --request-changes \
              --body "CI checks failed. Please review the build logs and fix the issues before merging."
          fi

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/setup-workspace

      - name: Build client
        run: bun run build:client

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npx playwright test --config=playwright.config.js
        env:
          CI: true
