name: Checks

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "LICENSE"
      - ".github/ISSUE_TEMPLATE/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "LICENSE"
      - ".github/ISSUE_TEMPLATE/**"
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  checks:
    name: Checks (ubuntu-only)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/setup-workspace

      - name: Governance tier check
        if: github.event_name == 'pull_request'
        run: bun run governance:check
        env:
          GITHUB_BASE_REF: ${{ github.event.pull_request.base.ref }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Spec validation (strict + 100% coverage)
        # https://github.com/marketplace/actions/spec-sync
        uses: CorvidLabs/spec-sync@6d9a8970b6f7534c33424fe13239b6c824fda336
        with:
          strict: 'true'
          require-coverage: '100'

      - name: Build client
        run: bun run build:client
