name: Stats

on:
  pull_request:
    branches: [main]
    paths:
      - "server/**"
      - "client/**"
      - "shared/**"
      - "package.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  stats:
    name: Stats Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: ./.github/actions/setup-workspace

      - name: Stats check
        run: bun run stats:check -- --skip-tests
