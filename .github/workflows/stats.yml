name: Stats

on:
  pull_request:
    branches: [main]
    paths:
      - "server/**"
      - "client/**"
      - "shared/**"
      - "package.json"
  workflow_dispatch:

concurrency:
  group: stats-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  stats:
    name: Stats Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: ./.github/actions/setup-workspace

      - name: Stats check
        run: bun run stats:check -- --skip-tests
