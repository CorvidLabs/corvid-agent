services:
  corvid-agent:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - db-data:/app/data
    env_file:
      - path: ../.env
        required: false
    environment:
      - PORT=3000
      # WARNING: 0.0.0.0 exposes the API on ALL network interfaces.
      # In production, use a reverse proxy (nginx/caddy) with TLS and
      # restrict BIND_HOST to 127.0.0.1 or a private network interface.
      - BIND_HOST=0.0.0.0
      - LOG_LEVEL=${LOG_LEVEL:-info}
      # Store DB and wallet in the persistent volume. Default path (./corvid-agent.db)
      # resolves to /app/corvid-agent.db which is NOT in the volume — set explicitly.
      - DATABASE_PATH=/app/data/corvid-agent.db
      - WALLET_KEYSTORE_PATH=/app/data/wallet-keystore.json
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bun", "-e", "const r = await fetch('http://localhost:3000/health/ready'); process.exit(r.ok ? 0 : 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  db-data:
