# One-command deployment: docker compose up
# See docs/self-hosting.md for production configuration.
#
# Quick start:
#   cp .env.example .env     # edit with your API keys
#   docker compose up -d     # start corvid-agent
#   open http://localhost:3000
#
# For production, see deploy/docker-compose.yml (resource limits, TLS, etc.)

services:
  corvid-agent:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - db-data:/app/data
    env_file:
      - path: .env
        required: false
    environment:
      - PORT=3000
      - BIND_HOST=0.0.0.0
      # Store DB and wallet in the persistent volume. Default path (./corvid-agent.db)
      # resolves to /app/corvid-agent.db which is NOT in the volume — set explicitly.
      - DATABASE_PATH=/app/data/corvid-agent.db
      - WALLET_KEYSTORE_PATH=/app/data/wallet-keystore.json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bun", "-e", "const r = await fetch('http://localhost:3000/health/ready'); process.exit(r.ok ? 0 : 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  db-data:
