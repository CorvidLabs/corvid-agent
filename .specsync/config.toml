# spec-sync v4 configuration
# Docs: https://github.com/CorvidLabs/spec-sync

specs_dir = "specs"
source_dirs = ["server"]
exclude_dirs = ["__tests__", "public"]
exclude_patterns = ["**/__tests__/**", "**/*.test.ts", "**/*.spec.ts", "server/index.ts", "server/bootstrap.ts"]
required_sections = ["Purpose", "Public API", "Invariants", "Behavioral Examples", "Error Cases", "Dependencies", "Change Log"]

[lifecycle]
track_history = false

[companions]
design = true
